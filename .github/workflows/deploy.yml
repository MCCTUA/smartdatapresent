name: Deploy to Hostatom
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        # ใช้ npm ตามที่คุณถนัด แต่เพิ่มตัวแก้ lightningcss เข้าไป
        run: |
          npm install
          npm install -D lightningcss-linux-x64-gnu

      - name: Build Static HTML
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 27.254.145.134
          username: git_depoly_6
          password: 9NjjZ#Rbyg9v!2np
          local-dir: ./dist/
          server-dir: ./smartdata.webdemona.com
          protocol: ftp
          dangerous-clean-slate: false
